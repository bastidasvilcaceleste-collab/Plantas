<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CelesteAI — Crear Cuenta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
<div class="ap">
    <div class="ac">
        <div class="ah">
            <a href="{{ url_for('index') }}" class="al">
                <svg viewBox="0 0 28 28" width="30" height="30" fill="none"><rect x="11" y="5" width="6" height="15" rx="3" fill="#4a7c59"/><rect x="7.5" y="10" width="3.5" height="5" rx="1.75" fill="#4a7c59"/><rect x="17" y="12" width="3.5" height="5" rx="1.75" fill="#4a7c59"/><rect x="6.5" y="20" width="15" height="2.5" rx="1.25" fill="#3a6647" opacity="0.5"/><path d="M7 22h14l-1.5 4H8.5L7 22z" fill="#3a6647" opacity="0.3"/><circle cx="14" cy="4" r="2.2" fill="#ff7eb3"/><circle cx="14" cy="4" r="1" fill="#ffd93d"/></svg>
                CelesteAI
            </a>
            <h1>Crear Cuenta</h1>
            <p>Comienza a diagnosticar tus plantas gratis</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for c, m in messages %}
            <div class="fl {{ 'fl-s' if c == 'success' else 'fl-e' }}"><i class="fas fa-{{ 'check-circle' if c == 'success' else 'exclamation-circle' }} me-2"></i>{{ m }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST" action="{{ url_for('auth.registro') }}">
            <div class="f"><label><i class="fas fa-user"></i> Nombre completo</label><input type="text" name="nombre" placeholder="Tu nombre" required></div>
            <div class="f"><label><i class="fas fa-envelope"></i> Correo electrónico</label><input type="email" name="email" placeholder="tu@email.com" required></div>
            <div class="f"><label><i class="fas fa-lock"></i> Contraseña</label><input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6"><div class="fh"><i class="fas fa-info-circle me-1"></i>Mínimo 6 caracteres</div></div>
            <button type="submit" class="ba">Crear Cuenta</button>
        </form>
        <div class="af">¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión</a></div>
        <a href="{{ url_for('index') }}" class="bl"><i class="fas fa-arrow-left me-1"></i>Volver al inicio</a>
    </div>
</div>
</body>
</html>
